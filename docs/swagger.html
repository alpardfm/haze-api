<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Haze API Swagger</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css">
    <style>
      :root {
        color-scheme: light;
        --page-bg: #f6f0e8;
        --ink: #1d2528;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at top left, rgba(245, 164, 96, 0.28), transparent 32rem),
          linear-gradient(135deg, #fff8ef 0%, var(--page-bg) 48%, #e9f1ef 100%);
        color: var(--ink);
        font-family: ui-serif, Georgia, "Times New Roman", serif;
      }

      .swagger-ui .topbar {
        display: none;
      }

      .haze-header {
        padding: 2rem clamp(1rem, 4vw, 3rem) 1rem;
      }

      .haze-header h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 4rem);
        letter-spacing: -0.05em;
      }

      .haze-header p {
        max-width: 44rem;
        margin: 0.5rem 0 0;
        color: #566263;
        font-family: ui-sans-serif, "Gill Sans", "Trebuchet MS", sans-serif;
        font-size: 1rem;
      }

      #swagger-ui {
        padding: 0 clamp(0.5rem, 3vw, 2rem) 2rem;
      }
    </style>
  </head>
  <body>
    <header class="haze-header">
      <h1>Haze API</h1>
      <p>Interactive Swagger UI untuk Admin Schedule Reminder API.</p>
    </header>
    <main id="swagger-ui"></main>
    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script>
      window.addEventListener("load", function () {
        window.ui = SwaggerUIBundle({
          dom_id: "#swagger-ui",
          url: "/api/haze/openapi.yaml",
          deepLinking: true,
          displayRequestDuration: true,
          persistAuthorization: true
        });
      });
    </script>
  </body>
</html>
