services:
  postgres:
    image: postgres:16-alpine
    container_name: haze-api-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-haze_api}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - haze_postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5435}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
    image: haze-api:latest
    container_name: haze-api
    env_file:
      - .env.vps
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${HOST_API_PORT:-18081}:8080"
    restart: unless-stopped

  reminder-worker:
    image: haze-api:latest
    container_name: haze-api-reminder-worker
    env_file:
      - .env.vps
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-c", "while true; do /app/reminder-worker; sleep ${REMINDER_WORKER_INTERVAL_SECONDS:-60}; done"]
    restart: unless-stopped

  status-worker:
    image: haze-api:latest
    container_name: haze-api-status-worker
    env_file:
      - .env.vps
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-c", "while true; do /app/status-worker; sleep ${STATUS_WORKER_INTERVAL_SECONDS:-60}; done"]
    restart: unless-stopped

  migrate:
    image: haze-api:latest
    container_name: haze-api-migrate
    profiles:
      - tools
    env_file:
      - .env.vps
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["/app/migrate"]

  seed-admin:
    image: haze-api:latest
    container_name: haze-api-seed-admin
    profiles:
      - tools
    env_file:
      - .env.vps
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["/app/seed-admin"]

volumes:
  haze_postgres_data:
